<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập · Sinh viên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/student.css" />
</head>
<body class="student-body">
  <main class="student-main">
    <section id="loginSection" class="student-login-shell">
      <div class="card login-card">
        <h1>Đăng nhập</h1>
        <p class="subtitle">Nhập MSSV và mật khẩu do nhà trường cấp</p>
        <form id="loginForm" class="stack">
          <label class="lbl" for="username">MSSV</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="Ví dụ: 38165" required />
          <label class="lbl" for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
          <button type="submit" class="btn primary btn-login" id="btnLogin">
            <span class="btn-spinner" aria-hidden="true"></span>
            <span class="btn-label">Đăng nhập</span>
          </button>
        </form>
        <p class="login-footer-links muted small">
          <a href="lecturer.html">Cổng Giảng viên</a>
          <span class="login-footer-sep" aria-hidden="true">·</span>
          <a href="index.html">Demo</a>
        </p>
        <div class="error" id="loginError"></div>
      </div>
    </section>
  </main>
  <script src="js/student-portal.js"></script>
</body>
</html>
