<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phân tích cảm xúc tiếng Việt</title>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #a1a1aa;
      --positive: #22c55e;
      --neutral: #eab308;
      --negative: #ef4444;
      --accent: #8b5cf6;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    main {
      max-width: 560px;
      width: 100%;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    textarea::placeholder { color: var(--muted); }
    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: none;
    }
    .result.show { display: block; }
    .sentence-block {
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .sentence-block:last-child { padding-bottom: 0; border-bottom: none; }
    .sentence-block + .sentence-block { padding-top: 12px; }
    .sentence-text {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      word-break: break-word;
    }
    .sentiment-badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .sentiment-badge.positive { background: rgba(34, 197, 94, 0.2); color: var(--positive); }
    .sentiment-badge.neutral { background: rgba(234, 179, 8, 0.2); color: var(--neutral); }
    .sentiment-badge.negative { background: rgba(239, 68, 68, 0.2); color: var(--negative); }
    .probs { margin-top: 1rem; }
    .prob-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    .prob-label { min-width: 70px; }
    .prob-bar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .prob-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .prob-fill.positive { background: var(--positive); }
    .prob-fill.neutral { background: var(--neutral); }
    .prob-fill.negative { background: var(--negative); }
    .prob-pct { min-width: 48px; color: var(--muted); }
    .preprocessed { margin-top: 1rem; font-size: 0.8rem; color: var(--muted); }
    .error { color: var(--negative); margin-top: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <h1>Phân tích cảm xúc tiếng Việt</h1>
    <p class="subtitle">PhoBERT · Chuẩn hóa · Tách từ · Dự đoán</p>

    <textarea
      id="input"
      placeholder="Nhập văn bản tiếng Việt để phân tích cảm xúc..."
    ></textarea>
    <button id="btn" onclick="predict()">Phân tích</button>

    <div class="result" id="result">
      <div id="sentences"></div>
    </div>
    <div class="error" id="error"></div>
  </main>

  <script>
    const API_URL = 'http://localhost:8001';
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    const sentencesEl = document.getElementById('sentences');
    const errEl = document.getElementById('error');

    function renderItem(item, idx) {
      let probsHtml = '';
      for (const [label, p] of Object.entries(item.probabilities || {})) {
        const pct = (p * 100).toFixed(1);
        probsHtml += `
          <div class="prob-row">
            <span class="prob-label">${label}</span>
            <div class="prob-bar"><div class="prob-fill ${label}" style="width:${pct}%"></div></div>
            <span class="prob-pct">${pct}%</span>
          </div>
        `;
      }
      return `
        <div class="sentence-block">
          ${idx >= 0 ? `<div class="sentence-text">"${(item.text || '').replace(/"/g, '&quot;')}"</div>` : ''}
          <span class="sentiment-badge ${item.sentiment}">${item.sentiment}</span>
          <div class="probs">${probsHtml}</div>
        </div>
      `;
    }

    async function predict() {
      const text = input.value.trim();
      if (!text) return;
      btn.disabled = true;
      errEl.textContent = '';
      result.classList.remove('show');

      try {
        const res = await fetch(`${API_URL}/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        const items = data.sentences || (data.sentiment ? [data] : []);
        if (!items.length || !items[0].sentiment) {
          errEl.textContent = 'API trả về dữ liệu không đúng định dạng.';
          return;
        }

        let html = '';
        items.forEach((item, idx) => {
          html += renderItem(item, items.length > 1 ? idx : -1);
        });
        sentencesEl.innerHTML = html;
        result.classList.add('show');
      } catch (e) {
        errEl.textContent = 'Lỗi: ' + (e.message || 'Không kết nối được API');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
